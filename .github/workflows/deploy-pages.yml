name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build with Blume
        # OG画像の日本語フォントは blume.config.ts の seo.og.fonts で指定（Google Fonts から取得）
        run: npx blume build --base "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify publish result (ntfy)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # アクセストークン(任意)。設定すると認証送信になり、共有IPのレート制限を回避できる。
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC is not set; skipping notification."
            exit 0
          fi
          if [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="✅ サイトを公開しました"
            MESSAGE="最新のレポートが公開されました"
            TAGS='["white_check_mark"]'
            PRIORITY="default"
          else
            TITLE="❌ デプロイ失敗"
            MESSAGE="build=${BUILD_RESULT} / deploy=${DEPLOY_RESULT}"
            TAGS='["rotating_light"]'
            PRIORITY="high"
          fi
          # トークンがあれば認証送信(レート制限がアカウント単位になり確実に届く)。
          auth=()
          if [ -n "$NTFY_TOKEN" ]; then
            auth=(-H "Authorization: Bearer ${NTFY_TOKEN}")
          else
            echo "::warning::NTFY_TOKEN 未設定のため匿名送信します（共有IPのレート制限で失敗しやすい）。"
          fi
          payload=$(jq -nc \
            --arg topic "$NTFY_TOPIC" \
            --arg title "$TITLE" \
            --arg message "$MESSAGE" \
            --arg click "https://hidekingerz.github.io/catch-all-favorite/" \
            --arg priority "$PRIORITY" \
            --argjson tags "$TAGS" \
            '{topic:$topic, title:$title, message:$message, click:$click, priority:$priority, tags:$tags}')
          # 通知は補助。失敗してもデプロイ結果には影響させないが、429等は短いバックオフで数回再送する。
          code=000
          for attempt in 1 2 3; do
            code=$(printf '%s' "$payload" | curl -sS -o /dev/null -w '%{http_code}' \
              "${auth[@]}" -H "Content-Type: application/json" -d @- https://ntfy.sh) || code=000
            if [ "$code" = "200" ]; then
              echo "Notification sent."
              break
            fi
            echo "ntfy 送信失敗 (HTTP ${code}) attempt ${attempt}/3"
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 5)); fi
          done
          if [ "$code" != "200" ]; then
            echo "::warning::ntfy notification failed (HTTP ${code}; 通知の上限の可能性)。デプロイ結果には影響しません。"
          fi
