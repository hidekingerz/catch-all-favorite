name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify publish result (ntfy)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC is not set; skipping notification."
            exit 0
          fi
          if [ "$DEPLOY_RESULT" = "success" ]; then
            TITLE="✅ サイトを公開しました"
            MESSAGE="最新のレポートが公開されました"
            TAGS='["white_check_mark"]'
            PRIORITY="default"
          else
            TITLE="❌ デプロイ失敗"
            MESSAGE="build=${BUILD_RESULT} / deploy=${DEPLOY_RESULT}"
            TAGS='["rotating_light"]'
            PRIORITY="high"
          fi
          # 通知は補助。レート制限(通知の上限=HTTP 429)等で失敗してもデプロイ結果には影響させない。
          code=$(jq -nc \
            --arg topic "$NTFY_TOPIC" \
            --arg title "$TITLE" \
            --arg message "$MESSAGE" \
            --arg click "https://hidekingerz.github.io/catch-all-favorite/" \
            --arg priority "$PRIORITY" \
            --argjson tags "$TAGS" \
            '{topic:$topic, title:$title, message:$message, click:$click, priority:$priority, tags:$tags}' \
          | curl -sS -o /dev/null -w '%{http_code}' \
              -H "Content-Type: application/json" -d @- https://ntfy.sh) || code=000
          if [ "$code" = "200" ]; then
            echo "Notification sent."
          else
            echo "::warning::ntfy notification failed (HTTP ${code}; 通知の上限の可能性)。デプロイ結果には影響しません。"
          fi
