name: Catchup PR automation

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  automate:
    runs-on: ubuntu-latest
    # キャッチアップスキルが生成するPR（タイトル接頭辞）だけを対象にする。
    # 対象を広げたい場合はこの条件を編集する。
    if: "startsWith(github.event.pull_request.title, 'chore: add frontend catchup')"
    steps:
      - name: Notify PR opened (ntfy)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC is not set; skipping notification."
            exit 0
          fi
          jq -nc \
            --arg topic "$NTFY_TOPIC" \
            --arg title "🚀 キャッチアップPRを作成しました（自動マージします）" \
            --arg message "${PR_TITLE} (#${PR_NUMBER})" \
            --arg click "$PR_URL" \
            '{topic:$topic, title:$title, message:$message, click:$click, tags:["rocket"]}' \
          | curl -fsS -H "Content-Type: application/json" -d @- https://ntfy.sh

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash --delete-branch \
            --repo "${{ github.repository }}"

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN によるマージは push トリガーを再起動しないため、
          # workflow_dispatch（再帰防止の例外）でデプロイを明示的に起動する。
          gh workflow run deploy-pages.yml \
            --ref main \
            --repo "${{ github.repository }}"
