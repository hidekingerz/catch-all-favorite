name: Content PR automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

# content-guard: 変更が content/ と index.md のみかを検証する「必須チェック」。
#   これを main の ruleset で required status check に登録することで、
#   レポート系スキルが有効化した auto-merge は「content/ と index.md だけのPR」が
#   CI を通った時にのみ発火する（保護はバイパスせず尊重）。
#   content/ 以外を含むPR（コード/CI/設定）ではこのチェックが fail し、auto-merge は発火しない。
#   それらのPRをマージするには管理者の明示的な操作（override）が必要 = 人手のゲートが残る。
# notify: レポートPRが開かれた時の補助通知（マージ判定には関与しない）。
permissions:
  contents: read
  pull-requests: read

jobs:
  content-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate changed files are report-only
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # レポート系PR = 変更が content/ 配下と index.md のみ（allowlist 方式）。
          # レポートは content/{catchup,research,security}/... に置かれ、一覧 index.md を伴う。
          # content/ 配下に新カテゴリを足しても自動的に対象になる。
          files=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename')
          echo "Changed files:"
          echo "$files"
          if [ -z "$files" ]; then
            echo "::error::変更ファイルを取得できませんでした。安全側に倒して fail します。"
            exit 1
          fi
          # 許可リスト(content/ または index.md)に該当しない変更ファイルを抽出する。
          bad=$(printf '%s\n' "$files" | grep -vE '^(content/|index\.md$)' || true)
          if [ -n "$bad" ]; then
            echo "::error::content/ と index.md 以外の変更が含まれています（auto-merge 対象外）:"
            printf '%s\n' "$bad"
            echo "report=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "content/ と index.md のみ。レポート系PRとして検証 OK。"
          echo "report=true" >> "$GITHUB_OUTPUT"

  notify:
    # 通知は PR が開かれた時だけ（synchronize の度には鳴らさない）。
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Determine report PR
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename')
          echo "Changed files:"
          echo "$files"
          bad=$(printf '%s\n' "$files" | grep -vE '^(content/|index\.md$)' | wc -l | tr -d ' ')
          if [ -z "$files" ]; then
            echo "report=false" >> "$GITHUB_OUTPUT"
          elif [ "$bad" -gt 0 ]; then
            echo "content/ 以外の変更を含むため通知対象外。"
            echo "report=false" >> "$GITHUB_OUTPUT"
          else
            echo "content/ と index.md のみ。通知対象。"
            echo "report=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify report PR opened (ntfy)
        if: steps.gate.outputs.report == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # アクセストークン(任意)。設定すると認証送信になり、共有IPのレート制限を回避できる。
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC is not set; skipping notification."
            exit 0
          fi
          # トークンがあれば認証送信(レート制限がアカウント単位になり確実に届く)。
          auth=()
          if [ -n "$NTFY_TOKEN" ]; then
            auth=(-H "Authorization: Bearer ${NTFY_TOKEN}")
          else
            echo "::warning::NTFY_TOKEN 未設定のため匿名送信します（共有IPのレート制限で失敗しやすい）。"
          fi
          payload=$(jq -nc \
            --arg topic "$NTFY_TOPIC" \
            --arg title "📝 レポートPRが作成されました（確認してマージしてください）" \
            --arg message "${PR_TITLE} (#${PR_NUMBER})" \
            --arg click "$PR_URL" \
            '{topic:$topic, title:$title, message:$message, click:$click, tags:["memo"]}')
          # 通知は補助。失敗してもワークフローは落とさないが、429等は短いバックオフで数回再送する。
          code=000
          for attempt in 1 2 3; do
            code=$(printf '%s' "$payload" | curl -sS -o /dev/null -w '%{http_code}' \
              "${auth[@]}" -H "Content-Type: application/json" -d @- https://ntfy.sh) || code=000
            if [ "$code" = "200" ]; then
              echo "Notification sent."
              break
            fi
            echo "ntfy 送信失敗 (HTTP ${code}) attempt ${attempt}/3"
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 5)); fi
          done
          if [ "$code" != "200" ]; then
            echo "::warning::ntfy notification failed (HTTP ${code}; 通知の上限の可能性)。ワークフローは継続します。"
          fi
