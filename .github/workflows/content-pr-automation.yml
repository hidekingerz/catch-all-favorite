name: Content PR notification

on:
  pull_request:
    types: [opened]

# 通知のみ。マージは ruleset(main 保護) を尊重し、管理者が手動で行う。
permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine report PR
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # レポート系（コンテンツのみ）のPRだけ通知する。
          # CI/設定/コードに触れるPRは通知しない（自分で作る前提のため）。
          # 新しい調査系ディレクトリは自動的に対象になる（denylist 方式）。
          files=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename')
          echo "Changed files:"
          echo "$files"
          sensitive='^(\.github/|\.claude/|scripts/|_includes/|_config\.yml|Gemfile(\.lock)?)'
          if [ -z "$files" ]; then
            echo "report=false" >> "$GITHUB_OUTPUT"
          elif echo "$files" | grep -Eq "$sensitive"; then
            echo "CI/設定/コードを含むため通知対象外。"
            echo "report=false" >> "$GITHUB_OUTPUT"
          else
            echo "コンテンツのみ。通知対象。"
            echo "report=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify report PR opened (ntfy)
        if: steps.gate.outputs.report == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC is not set; skipping notification."
            exit 0
          fi
          jq -nc \
            --arg topic "$NTFY_TOPIC" \
            --arg title "📝 レポートPRが作成されました（確認してマージしてください）" \
            --arg message "${PR_TITLE} (#${PR_NUMBER})" \
            --arg click "$PR_URL" \
            '{topic:$topic, title:$title, message:$message, click:$click, tags:["memo"]}' \
          | curl -fsS -H "Content-Type: application/json" -d @- https://ntfy.sh
